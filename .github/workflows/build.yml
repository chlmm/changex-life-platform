name: Build Tauri App

on:
  push:
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target universal-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''

    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Install dependencies (Ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev libayatana-appindicator3-dev librsvg2-dev

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            tauri/target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Install frontend dependencies
        run: |
          cd web
          npm install

      - name: Build frontend
        run: |
          cd web
          npm run build

      - name: Build Tauri app
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          projectPath: tauri
          tagName: ${{ github.ref_name }}
          releaseName: 'Changex Life Platform ${{ github.ref_name }}'
          releaseBody: 'See the assets to download and install this version.'
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}

      # 上传 Windows Portable 版本
      - name: Upload Windows Portable
        if: matrix.platform == 'windows-latest'
        uses: actions/upload-artifact@v4
        with:
          name: changex-life-platform-windows-portable
          path: |
            tauri/target/release/changex-life-platform.exe
          if-no-files-found: warn

      # 上传 macOS Portable 版本
      - name: Upload macOS Portable
        if: matrix.platform == 'macos-latest'
        uses: actions/upload-artifact@v4
        with:
          name: changex-life-platform-macos-portable
          path: |
            tauri/target/universal-apple-darwin/release/changex-life-platform
            tauri/target/aarch64-apple-darwin/release/changex-life-platform
            tauri/target/x86_64-apple-darwin/release/changex-life-platform
          if-no-files-found: warn

      # 上传 Linux Portable 版本
      - name: Upload Linux Portable
        if: matrix.platform == 'ubuntu-22.04'
        uses: actions/upload-artifact@v4
        with:
          name: changex-life-platform-linux-portable
          path: |
            tauri/target/release/changex-life-platform
          if-no-files-found: warn

  # 发布 Release（只在推送 tag 时触发）
  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/**/*
          generate_release_notes: true
